<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="lcTitle lcDesc">
  <title id="lcTitle">LeetCode stats placeholder</title>
  <desc id="lcDesc">Placeholder card indicating where LeetCode stats can be connected once a username is available.</desc>
  <defs>
    <linearGradient id="lcBg" x1="0" y1="0" x2="1200" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071121"/>
      <stop offset="1" stop-color="#110A1E"/>
    </linearGradient>
    <linearGradient id="lcAccent" x1="48" y1="0" x2="1152" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="250" rx="28" fill="url(#lcBg)"/>
  <rect x="24" y="24" width="1152" height="202" rx="24" fill="#0A1326" fill-opacity="0.82" stroke="url(#lcAccent)" stroke-opacity="0.72"/>
  <text x="60" y="72" fill="#8BE9FF" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">LEETCODE SIGNAL</text>
  <text x="60" y="118" fill="#F5F7FF" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="800">Connect your LeetCode username to unlock live coding stats.</text>
  <text x="60" y="156" fill="#9BB7E7" font-family="Consolas, 'Courier New', monospace" font-size="18">Once your handle is added, this section can show solved problems, ranking, activity, or heatmap insights.</text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#D8E8FF">
    <rect x="60" y="178" width="168" height="28" rx="14" fill="#07192E" stroke="#00D9FF" stroke-opacity="0.52"/>
    <text x="85" y="197">DSA PRACTICE</text>
    <rect x="244" y="178" width="186" height="28" rx="14" fill="#121129" stroke="#A855F7" stroke-opacity="0.52"/>
    <text x="272" y="197">INTERVIEW READINESS</text>
  </g>
</svg>
