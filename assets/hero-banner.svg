<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Anuj Barlawar GitHub profile banner</title>
  <desc id="heroDesc">Dark cyber-inspired banner for a Python, data science, machine learning, and AI student portfolio.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04070F"/>
      <stop offset="0.55" stop-color="#071225"/>
      <stop offset="1" stop-color="#12091E"/>
    </linearGradient>
    <linearGradient id="panelGradient" x1="140" y1="96" x2="960" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1832" stop-opacity="0.90"/>
      <stop offset="1" stop-color="#111022" stop-opacity="0.74"/>
    </linearGradient>
    <linearGradient id="blueStroke" x1="64" y1="0" x2="1530" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1290 120) rotate(90) scale(180 240)">
      <stop stop-color="#00D9FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 410) rotate(90) scale(160 260)">
      <stop stop-color="#7C3AED" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#173253" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sharpGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="28" fill="url(#bgGradient)"/>
  <rect width="1600" height="520" rx="28" fill="url(#gridPattern)"/>

  <g opacity="0.48">
    <ellipse cx="1290" cy="120" rx="220" ry="160" fill="url(#glowBlue)"/>
    <ellipse cx="150" cy="410" rx="240" ry="180" fill="url(#glowViolet)"/>
  </g>

  <g opacity="0.13">
    <path d="M1020 94H1510" stroke="#2AC7FF" stroke-width="1.5"/>
    <path d="M1060 138H1480" stroke="#2AC7FF" stroke-width="1.5"/>
    <path d="M1100 182H1460" stroke="#2AC7FF" stroke-width="1.5"/>
    <path d="M1088 338H1490" stroke="#A855F7" stroke-width="1.5"/>
    <path d="M1020 382H1460" stroke="#A855F7" stroke-width="1.5"/>
    <path d="M1080 426H1510" stroke="#A855F7" stroke-width="1.5"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M80 78H468" stroke="url(#blueStroke)" stroke-width="2.5" stroke-linecap="round" opacity="0.42"/>
    <path d="M1028 444H1522" stroke="url(#blueStroke)" stroke-width="2.5" stroke-linecap="round" opacity="0.42"/>
  </g>

  <g>
    <rect x="74" y="62" width="930" height="370" rx="30" fill="url(#panelGradient)" stroke="url(#blueStroke)" stroke-opacity="0.58" stroke-width="1.5"/>
    <path d="M96 104H982" stroke="#224A70" stroke-width="1"/>
    <path d="M96 390H982" stroke="#224A70" stroke-width="1"/>
    <circle cx="118" cy="83" r="5" fill="#00D9FF"/>
    <circle cx="138" cy="83" r="5" fill="#7C3AED"/>
    <circle cx="158" cy="83" r="5" fill="#14F195"/>
    <text x="190" y="88" fill="#86A7D5" font-family="'Segoe UI', Arial, sans-serif" font-size="14" letter-spacing="3">PROFILE.README // STUDENT PORTFOLIO</text>

    <text x="118" y="165" fill="#8BE9FF" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4">PYTHON / DATA SCIENCE / AI PROJECTS</text>
    <text x="116" y="238" fill="#F5F7FF" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="2">ANUJ RAJESHWAR BARLAWAR</text>
    <text x="118" y="286" fill="#A9C5FF" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="2">FOURTH-YEAR B.TECH AI AND DATA SCIENCE STUDENT</text>
    <text x="118" y="328" fill="#85A6D5" font-family="Consolas, 'Courier New', monospace" font-size="19">Practical Python, data science, ML, and AI learning projects.</text>

    <g font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700">
      <rect x="118" y="356" width="110" height="34" rx="17" fill="#08192C" stroke="#00D9FF" stroke-opacity="0.75"/>
      <text x="149" y="378" fill="#DDF8FF">PYTHON</text>
      <rect x="242" y="356" width="96" height="34" rx="17" fill="#0D1124" stroke="#7C3AED" stroke-opacity="0.72"/>
      <text x="271" y="378" fill="#EFE6FF">FLASK</text>
      <rect x="352" y="356" width="126" height="34" rx="17" fill="#08192C" stroke="#00D9FF" stroke-opacity="0.72"/>
      <text x="383" y="378" fill="#DDF8FF">POWER BI</text>
      <rect x="494" y="356" width="194" height="34" rx="17" fill="#0D1124" stroke="#A855F7" stroke-opacity="0.58"/>
      <text x="591" y="378" fill="#F3E8FF" font-size="14" text-anchor="middle">INTERNSHIP FOCUS</text>
    </g>
  </g>

  <g transform="translate(1068 90)">
    <rect width="416" height="286" rx="28" fill="#081121" fill-opacity="0.56" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="34" y="42" fill="#85A6D5" font-family="Consolas, 'Courier New', monospace" font-size="15" letter-spacing="2">CURRENT FOCUS</text>

    <g filter="url(#sharpGlow)">
      <circle cx="80" cy="96" r="8" fill="#00D9FF"/>
      <circle cx="172" cy="66" r="6" fill="#7C3AED"/>
      <circle cx="232" cy="142" r="7" fill="#14F195"/>
      <circle cx="324" cy="102" r="7" fill="#00D9FF"/>
      <circle cx="350" cy="182" r="5" fill="#7C3AED"/>
      <circle cx="118" cy="196" r="6" fill="#14F195"/>
    </g>

    <g stroke-width="2">
      <path d="M80 96L172 66L232 142L324 102L350 182" stroke="#3BD7FF" stroke-opacity="0.5"/>
      <path d="M80 96L118 196L232 142" stroke="#A855F7" stroke-opacity="0.5"/>
      <path d="M118 196L350 182" stroke="#14F195" stroke-opacity="0.34"/>
    </g>

    <g font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#D6E6FF">
      <rect x="34" y="224" width="138" height="26" rx="13" fill="#07192E" stroke="#00D9FF" stroke-opacity="0.28"/>
      <text x="57" y="241">RAG BASICS</text>
      <rect x="188" y="224" width="132" height="26" rx="13" fill="#111126" stroke="#A855F7" stroke-opacity="0.28"/>
      <text x="206" y="241">PYTHON DSA</text>
    </g>
  </g>

  <g opacity="0.18">
    <rect x="0" y="208" width="1600" height="3" fill="url(#blueStroke)"/>
  </g>
</svg>
