<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="dsTitle dsDesc">
  <title id="dsTitle">Power BI Weather Dashboard card</title>
  <desc id="dsDesc">Project card for a Power BI weather dashboard and visualization project.</desc>
  <defs>
    <linearGradient id="dsBg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07121D"/>
      <stop offset="1" stop-color="#0B1723"/>
    </linearGradient>
    <linearGradient id="dsAccent" x1="48" y1="0" x2="1152" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14F195"/>
      <stop offset="1" stop-color="#00D9FF"/>
    </linearGradient>
    <filter id="dsShadow" x="-8%" y="-18%" width="116%" height="136%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#14F195" flood-opacity="0.14"/>
    </filter>
    <style>
      .card-frame { transition: stroke-opacity 180ms ease, fill-opacity 180ms ease; }
      svg:hover .card-frame { stroke-opacity: 0.72; fill-opacity: 0.9; }
      .accent-line { opacity: 0.68; }
      svg:hover .accent-line { opacity: 0.92; }
    </style>
  </defs>
  <rect width="1200" height="260" rx="28" fill="url(#dsBg)"/>
  <rect class="card-frame" x="24" y="24" width="1152" height="212" rx="24" fill="#0A1326" fill-opacity="0.84" stroke="url(#dsAccent)" stroke-opacity="0.58" filter="url(#dsShadow)"/>
  <path class="accent-line" d="M60 46H1140" stroke="url(#dsAccent)" stroke-width="1.5"/>
  <text x="60" y="74" fill="#74F8C6" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">PROJECT 03</text>
  <rect x="934" y="54" width="170" height="30" rx="15" fill="#071A1F" stroke="#14F195" stroke-opacity="0.46"/>
  <text x="1019" y="74" fill="#DBFFF2" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="700" text-anchor="middle">INTERVIEW READY</text>
  <text x="60" y="120" fill="#F5F7FF" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="800">Power BI Weather Dashboard</text>
  <text fill="#A4C0EA" font-family="Consolas, 'Courier New', monospace" font-size="17">
    <tspan x="60" y="154">A weather dashboard for practicing visual analysis,</tspan>
    <tspan x="60" y="176">dataset interpretation, and clear reporting.</tspan>
  </text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#DBFFF2">
    <rect x="60" y="192" width="124" height="26" rx="13" fill="#071A1F" stroke="#14F195" stroke-opacity="0.52"/>
    <text x="85" y="210">POWER BI</text>
    <rect x="196" y="192" width="122" height="26" rx="13" fill="#07192E" stroke="#00D9FF" stroke-opacity="0.52"/>
    <text x="220" y="210">WEATHER</text>
    <rect x="330" y="192" width="128" height="26" rx="13" fill="#071A1F" stroke="#14F195" stroke-opacity="0.52"/>
    <text x="354" y="210">ANALYSIS</text>
  </g>
  <g opacity="0.6">
    <path d="M872 180V94" stroke="#14F195" stroke-width="4"/>
    <path d="M940 180V128" stroke="#00D9FF" stroke-width="4"/>
    <path d="M1008 180V78" stroke="#14F195" stroke-width="4"/>
    <path d="M1076 180V112" stroke="#00D9FF" stroke-width="4"/>
    <path d="M1144 180V144" stroke="#14F195" stroke-width="4"/>
    <path d="M852 196H1158" stroke="#27526E" stroke-width="2"/>
  </g>
</svg>
