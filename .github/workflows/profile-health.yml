name: Profile Health Check

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify local profile assets
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            "SETUP.md"
            "assets/hero-banner.svg"
            "assets/divider.svg"
            "assets/footer.svg"
            "assets/generated/github-stats.svg"
            "assets/generated/top-languages.svg"
            "assets/generated/repo-overview.svg"
            "assets/project-rag.svg"
            "assets/project-chatbots.svg"
            "assets/project-ds.svg"
            "assets/project-ml.svg"
            ".github/workflows/snake.yml"
            ".github/workflows/profile-assets.yml"
            "scripts/generate-profile-assets.mjs"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Verify external widgets
        shell: bash
        env:
          USERNAME: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          urls=(
            "https://readme-typing-svg.demolab.com/?lines=health-check"
            "https://github-readme-activity-graph.vercel.app/graph?username=${USERNAME}&theme=tokyo-night"
          )

          for url in "${urls[@]}"; do
            echo "Checking ${url}"
            curl --fail --silent --show-error --location --retry 3 --retry-delay 5 "$url" > /dev/null
          done
