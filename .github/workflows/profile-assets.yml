name: Refresh Profile Assets

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate profile assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
        run: node scripts/generate-profile-assets.mjs

      - name: Commit refreshed assets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain assets/generated)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/generated
            git commit -m "Refresh profile assets"
            git push
          else
            echo "No asset changes detected."
          fi
